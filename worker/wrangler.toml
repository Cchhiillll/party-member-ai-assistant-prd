name = "party-member-ai"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 开发端口
[dev]
port = 8787

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "party-member-ai"
database_id = "your-database-id-here"  # 部署时会自动生成

# 环境变量
[vars]
ENVIRONMENT = "development"

# AI 绑定 (Cloudflare AI)
[ai]
binding = "AI"

# KV 存储 (可选，用于缓存)
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-id"

# 生产环境
[env.production]
name = "party-member-ai-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "party-member-ai"
database_id = "your-production-database-id"

# 敏感变量通过 wrangler secret 设置:
# wrangler secret put OPENAI_API_KEY
# wrangler secret put JWT_SECRET
