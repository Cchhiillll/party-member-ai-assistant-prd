name = "party-member-ai"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "b6b84625fc6bfdd652a896a58bc89575"

# 开发端口
[dev]
port = 8787

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "ai-new-db"
database_id = "9d051c9b-9e30-4110-b290-3f306c71651d"

# 环境变量
[vars]
ENVIRONMENT = "development"

# AI 绑定 (Cloudflare AI)
[ai]
binding = "AI"

# KV 存储 (可选，用于缓存)
# [[kv_namespaces]]
# binding = "KV"
# id = "your-kv-id"

# 生产环境
[env.production]
name = "party-member-ai-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "party-member-ai"
database_id = "your-production-database-id"

# 敏感变量通过 wrangler secret 设置:
# wrangler secret put OPENAI_API_KEY
# wrangler secret put JWT_SECRET
